version: '3.8'

services:
  # Infrastructure
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  # Databases
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: daraz_users
    ports:
      - "5432:5432"

  postgres-wishlist:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: daraz_wishlists
    ports:
      - "5433:5432"

  mongodb:
    image: mongo:6-jammy
    ports:
      - "27017:27017"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  # Spring Cloud Services
  config-server:
    build:
      context: ./config-server
    ports:
      - "8888:8888"
    depends_on:
      - kafka

  discovery-server:
    build:
      context: ./discovery-server
    ports:
      - "8761:8761"
    depends_on:
      - config-server

  api-gateway:
    build:
      context: ./api-gateway
    ports:
      - "8080:8080"
    depends_on:
      - config-server
      - discovery-server

  user-service:
    build:
      context: ./user-service
    ports:
      - "8081:8081"
    depends_on:
      - config-server
      - discovery-server
      - postgres
      - kafka

  catalog-service:
    build:
      context: ./catalog-service
    ports:
      - "8082:8082"
    depends_on:
      - config-server
      - discovery-server
      - mongodb
      - kafka

  cart-service:
    build:
      context: ./cart-service
    ports:
      - "8083:8083"
    depends_on:
      - config-server
      - discovery-server
      - redis

  wishlist-service:
    build:
      context: ./wishlist-service
    ports:
      - "8084:8084"
    depends_on:
      - config-server
      - discovery-server
      - postgres-wishlist
